<head>
<meta charset="UTF-8">

<title>Eternal Happiness Convention 2026</title>

<style>

html,body{

}

body{

@keyframes kenburns{

        transform:scale(1);
    }
    to{
        transform:scale(1.1);
    }

.overlay{
    position:absolute;
    inset:0;
    display:flex;

    justify-content:center;
    align-items:center;

.logo{

    margin-bottom:30px;
}

.title{
    font-size:clamp(32px,6vw,72px);
    font-weight:bold;

.subtitle{
    font-size:clamp(18px,3vw,32px);

    opacity:.95;
}

.date{
    margin-top:30px;
    font-size:clamp(22px,3vw,36px);
}

.countdown{
    margin-top:40px;
    display:flex;
    gap:20px;

    justify-content:center;
}

.box{
    min-width:120px;

    background:rgba(255,255,255,.15);
    border:1px solid rgba(255,255,255,.2);

.number{

}

</style>
</head>

<body>

<audio autoplay loop>
    <source src="sjjm_E_163.mp3" type="audio/mpeg">
</audio>

<div class="overlay">

    <img src="logo.png" class="logo">

    <div class="title">
        Eternal Happiness Convention 2026
    </div>

    <div class="subtitle">
        Amalfi Belvedere<br>
        San Diego
    </div>

    <div class="date">
        27 • 28 • 29 Novembre 2026
    </div>

    <div class="countdown">

        <div class="box">
            <div class="number" id="days">0</div>
            <div class="label">Giorni</div>
        </div>

        <div class="box">
            <div class="number" id="hours">0</div>
            <div class="label">Ore</div>
        </div>

        <div class="box">
            <div class="number" id="minutes">0</div>
            <div class="label">Minuti</div>
        </div>

        <div class="box">
            <div class="number" id="seconds">0</div>
            <div class="label">Secondi</div>
        </div>

    </div>

</div>

<div class="footer">
    Vi aspettiamo a San Diego ❤️
</div>

<script>

const eventDate =
new Date("2026-11-27T09:00:00").getTime();

function updateCountdown(){

    const now = new Date().getTime();
    const distance = eventDate - now;

    if(distance < 0){
        document.querySelector(".countdown").innerHTML =
        "<h1>La convention è iniziata!</h1>";
        return;
    }

    const days = Math.floor(distance / (1000*60*60*24));
    const hours = Math.floor((distance % (1000*60*60*24)) / (1000*60*60));
    const minutes = Math.floor((distance % (1000*60*60)) / (1000*60));
    const seconds = Math.floor((distance % (1000*60)) / 1000);

    document.getElementById("days").innerHTML = days;
    document.getElementById("hours").innerHTML = hours;
    document.getElementById("minutes").innerHTML = minutes;
    document.getElementById("seconds").innerHTML = seconds;
}

updateCountdown();

setInterval(updateCountdown,1000);

</script>

</body>
